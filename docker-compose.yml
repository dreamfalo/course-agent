version: "3.8"

# ============================================================
# 智能课程助手 Agent - 一键启动编排
# docker-compose up -d
# ============================================================

services:
  # ─── MySQL 8.0 ───
  mysql:
    image: mysql:8.0
    container_name: course_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-course_agent_2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-course_agent_db}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init_tables.sql:/docker-entrypoint-initdb.d/01_init_tables.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-course_agent_2024}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - course_network

  # ─── Chroma 向量库 ───
  chroma:
    image: chromadb/chroma:latest
    container_name: course_chroma
    restart: unless-stopped
    ports:
      - "${CHROMA_PORT:-8001}:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma_data
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma_data:/chroma/chroma_data
    networks:
      - course_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO 文件存储 ───
  minio:
    image: minio/minio:latest
    container_name: course_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - course_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Django 后端 ───
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: course_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "${DJANGO_DEBUG:-False}"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-course_agent_db}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-course_agent_2024}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-course-files}
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./agent_core:/app/agent_core
      - ./media:/app/media
      - ./chroma_db:/app/chroma_db
    depends_on:
      mysql:
        condition: service_healthy
      chroma:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn course_agent_backend.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    networks:
      - course_network

  # ─── Vue 前端（Nginx） ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: course_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - course_network

volumes:
  mysql_data:
  chroma_data:
  minio_data:

networks:
  course_network:
    driver: bridge
